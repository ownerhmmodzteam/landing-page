<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HM MODZ CHAT SERVER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --accent-blue: #0A84FF;
            --chat-bg: #0b0b0c;
            --bubble-other: #1c1c1e;
            --border: rgba(255, 255, 255, 0.1);
        }
        body, html {
            height: 100%;
            margin: 0;
            background-color: var(--ios-bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            background: var(--chat-bg);
            position: relative;
        }
        header {
            padding: 12px 15px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }
        .music-overlay {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 12px 18px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .progress-bar-container {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        #p-bar {
            width: 0%;
            height: 100%;
            background: var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-blue);
        }
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 120px;
        }
        .msg-wrapper { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; }
        .msg-me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-other { align-self: flex-start; }
        .avatar { width: 32px; height: 32px; rounded-full: 50%; border: 1px solid var(--border); flex-shrink: 0; }
        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
        }
        .bubble-me { background: var(--accent-blue); border-bottom-right-radius: 4px; }
        .bubble-other { background: var(--bubble-other); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .user-label { font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.3); margin-bottom: 3px; text-transform: uppercase; }
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 600px;
            margin: 0 auto;
            padding: 15px 15px calc(20px + env(safe-area-inset-bottom));
            background: #0b0b0c;
            border-top: 1px solid var(--border);
            z-index: 9999;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 6px 6px 18px;
            border-radius: 30px;
            border: 1px solid var(--border);
        }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 15px; height: 42px; }
        .send-btn { width: 42px; height: 42px; background: var(--accent-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); }
        #yt-api-frame { display: none; }
    </style>
</head>
<body>

    <div class="chat-container">
        <header>
            <div class="flex items-center gap-3">
                <img src="https://files.catbox.moe/4y3suf.png" class="w-10 h-10 rounded-full border border-white/20">
                <div>
                    <h1 class="text-sm font-black tracking-tight">HM MODZ CHAT</h1>
                    <p class="text-[9px] text-blue-500 font-bold uppercase tracking-widest">Chat Dengan Semua Orang Yang Ada Di Dalam Aplikasi Ini</p>
                </div>
            </div>

            <div class="music-overlay">
                <div class="flex justify-between items-center">
                    <div class="overflow-hidden">
                        <p id="track-name" class="text-[11px] font-bold truncate w-44">Loading Playlist...</p>
                        <p class="text-[9px] text-white/30 font-bold uppercase tracking-tighter" id="track-status">Music Hub....</p>
                    </div>
                    <div class="flex items-center gap-5">
                        <button onclick="prevS()"><i class="fa-solid fa-backward-step text-sm"></i></button>
                        <button onclick="toggleS()" id="btn-play"><i class="fa-solid fa-play text-sm text-blue-500"></i></button>
                        <button onclick="nextS()"><i class="fa-solid fa-forward-step text-sm"></i></button>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div id="p-bar"></div>
                </div>
            </div>
        </header>

        <div id="chat-messages"></div>

        <div class="input-area">
            <div id="reply-preview" class="hidden bg-blue-500/10 p-3 rounded-2xl mb-2 border-l-4 border-blue-500 flex justify-between items-center backdrop-blur-md">
                <div class="overflow-hidden">
                    <p id="rep-user" class="text-[10px] font-bold text-blue-400 uppercase"></p>
                    <p id="rep-text" class="text-xs text-white/40 truncate w-48"></p>
                </div>
                <button onclick="cancelReply()"><i class="fa-solid fa-times-circle text-white/30"></i></button>
            </div>
            <div class="input-wrapper">
                <input type="text" id="chat-input" placeholder="Tulis pesan Anda..." autocomplete="off">
                <button onclick="sendMessage()" class="send-btn"><i class="fa-solid fa-paper-plane text-white text-sm"></i></button>
            </div>
        </div>
    </div>

    <div id="yt-api-frame"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA9BxTN24XqHOjB1qQdVa6yYbRjun0Sl8c",
            authDomain: "cracker-key.firebaseapp.com",
            databaseURL: "https://cracker-key-default-rtdb.firebaseio.com",
            projectId: "cracker-key",
            storageBucket: "cracker-key.firebasestorage.app",
            messagingSenderId: "609437093302",
            appId: "1:609437093302:web:75a62480ea15324f968517"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const username = localStorage.getItem('hm_user_name') || 'User-HM-' + Math.floor(1000 + Math.random() * 9000);
        const uid = localStorage.getItem('hm_chat_uid') || 'ID-' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('hm_user_name', username);
        localStorage.setItem('hm_chat_uid', uid);

        let currentReply = null;
        let player;
        const playlist = ['vsokYhEYvXA', 'rpaAEI67iag', 'IoGPlfXoBuY', '8mSmYVevPG8', 'Y_BXtthvuaA', 'op5CyEdRpvg', '7XZIRp_Sf2k', 'iQo-8wx0l0Y', 'fxHrWj5kSck', 'bl6Rf8FMhSY'];
        let trackIdx = 0;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-api-frame', {
                height: '0', width: '0',
                videoId: playlist[trackIdx],
                events: {
                    'onReady': (e) => { updateT(); setInterval(updateP, 1000); },
                    'onStateChange': (e) => { if(e.data == 0) nextS(); updateT(); }
                }
            });
        }

        function updateT() {
            const d = player.getVideoData();
            document.getElementById('track-name').innerText = d.title || "Unknown Track";
            document.getElementById('track-status').innerText = `Track ${trackIdx + 1} / ${playlist.length}`;
        }

        function updateP() {
            if (player && player.getCurrentTime) {
                const perc = (player.getCurrentTime() / player.getDuration()) * 100;
                document.getElementById('p-bar').style.width = perc + '%';
            }
        }

        function toggleS() {
            const btn = document.getElementById('btn-play');
            if (player.getPlayerState() == 1) {
                player.pauseVideo();
                btn.innerHTML = '<i class="fa-solid fa-play text-sm text-blue-500"></i>';
            } else {
                player.playVideo();
                btn.innerHTML = '<i class="fa-solid fa-pause text-sm text-blue-500"></i>';
            }
        }

        function nextS() {
            trackIdx = (trackIdx + 1) % playlist.length;
            player.loadVideoById(playlist[trackIdx]);
            updateT();
        }

        function prevS() {
            trackIdx = (trackIdx - 1 + playlist.length) % playlist.length;
            player.loadVideoById(playlist[trackIdx]);
            updateT();
        }

        function sendMessage() {
            const inp = document.getElementById('chat-input');
            const val = inp.value.trim();
            if(!val) return;
            db.ref('global_chat_v6').push({ uid, user: username, msg: val, time: Date.now(), reply: currentReply });
            inp.value = '';
            cancelReply();
        }

        document.getElementById('chat-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        db.ref('global_chat_v6').limitToLast(50).on('child_added', (snap) => {
            const d = snap.val();
            const isMe = d.uid === uid;
            const box = document.getElementById('chat-messages');
            const html = `
                <div class="msg-wrapper ${isMe ? 'msg-me' : 'msg-other'}" id="msg-${snap.key}">
                    <img src="https://ui-avatars.com/api/?name=${d.user}&background=random&color=fff" class="avatar rounded-full">
                    <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                        <span class="user-label">${d.user}</span>
                        <div class="bubble ${isMe ? 'bubble-me' : 'bubble-other'}" onclick="handleMsg('${snap.key}', '${d.user}', '${d.msg.replace(/'/g,"\\'")}', ${isMe})">
                            ${d.reply ? `<div class="bg-black/30 p-2 rounded-xl mb-2 text-[10px] border-l-2 border-white/50"><b>@${d.reply.user}</b><br>${d.reply.msg}</div>` : ''}
                            ${d.msg}
                        </div>
                    </div>
                </div>`;
            box.insertAdjacentHTML('beforeend', html);
            box.scrollTop = box.scrollHeight;
        });

        db.ref('global_chat_v6').on('child_removed', (s) => document.getElementById('msg-' + s.key)?.remove());

        function handleMsg(key, user, msg, isMe) {
            if(isMe) {
                Swal.fire({ title: 'Hapus?', background: '#1c1c1e', color: '#fff', showCancelButton: true, confirmButtonColor: '#ff3b30' }).then((r) => { if(r.isConfirmed) db.ref('global_chat_v6/' + key).remove(); });
            } else {
                currentReply = { user, msg };
                document.getElementById('rep-user').innerText = 'Balas @' + user;
                document.getElementById('rep-text').innerText = msg;
                document.getElementById('reply-preview').classList.remove('hidden');
                document.getElementById('chat-input').focus();
            }
        }

        function cancelReply() { currentReply = null; document.getElementById('reply-preview').classList.add('hidden'); }
    </script>
</body>
</html>
