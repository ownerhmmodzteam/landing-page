<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HM MODZ STREAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ios-bg: #000000;
            --accent-blue: #3b82f6;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--ios-bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: -1;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at center, #0a0a0c 0%, #000 100%);
        }

        .glow-sphere {
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
            z-index: -1;
            filter: blur(60px);
            animation: move 25s infinite alternate;
        }

        @keyframes move {
            0% { transform: translate(-20%, -20%); }
            100% { transform: translate(30%, 40%); }
        }

        .ios-blur {
            background: rgba(20, 20, 22, 0.75);
            backdrop-filter: blur(45px) saturate(210%);
            -webkit-backdrop-filter: blur(45px) saturate(210%);
            border: 1px solid var(--border);
            border-radius: 32px;
        }

        .btn-ios {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-ios:active { transform: scale(0.92); filter: brightness(1.2); }

        .profile-container {
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        .nav-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--border);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }

        .nav-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .nav-card:hover::after { transform: translateX(100%); }

        .nav-card:hover {
            border-color: rgba(59, 130, 246, 0.4);
            background: rgba(59, 130, 246, 0.08);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(25px);
        }

        .skeleton {
            background: linear-gradient(90deg, #0a0a0a 25%, #1a1a1a 50%, #0a0a0a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .icon-box {
            position: relative;
            transition: transform 0.3s ease;
        }
        .nav-card:hover .icon-box { transform: scale(1.1) rotate(-5deg); }
        
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #22c55e; box-shadow: 0 0 8px #22c55e;
            position: absolute; top: 12px; right: 12px;
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen px-6 pt-16 pb-24">

    <canvas id="bg-canvas"></canvas>
    <div class="glow-sphere"></div>

    <div id="skeleton-loader" class="fixed inset-0 bg-black z-[9500] flex flex-col items-center justify-center p-8 space-y-6">
        <div class="skeleton w-24 h-24 rounded-[32px]"></div>
        <div class="skeleton h-4 w-40 rounded-full"></div>
        <div class="skeleton h-2 w-32 rounded-full opacity-50"></div>
    </div>

    <div id="custom-alert" class="fixed inset-0 bg-black/85 z-[9600] hidden items-end justify-center p-6 backdrop-blur-md">
        <div class="w-full max-w-[380px] animate-in slide-in-from-bottom duration-500">
            <div class="ios-blur overflow-hidden mb-4 shadow-2xl">
                <div class="p-5 text-center border-b border-white/5 bg-white/[0.02]">
                    <h2 id="alert-title" class="text-[11px] font-black text-white/40 uppercase tracking-[0.25em]">Sistem Gateway</h2>
                </div>
                <div id="normal-actions" class="hidden">
                    <button id="btn-main-action" onclick="executeRedirect()" class="w-full p-5 text-blue-400 font-bold text-lg active:bg-white/5">Lanjutkan Akses</button>
                </div>
                <div id="server-actions" class="hidden flex flex-col text-center">
                    <button onclick="executeRedirect('https://s11.nontonanimeid.boats/')" class="w-full p-5 text-blue-400 font-bold text-lg border-b border-white/5 active:bg-white/5">Main Server (Fast)</button>
                    <button onclick="executeRedirect('https://otakudesu.cloud/')" class="w-full p-5 text-blue-400 font-semibold text-lg active:bg-white/5">Cloud Server (Backup)</button>
                </div>
            </div>
            <button onclick="closeAlert()" class="w-full p-5 ios-blur text-red-500/80 font-bold text-lg active:bg-red-500/10 transition-all">Batalkan</button>
        </div>
    </div>

    <div id="global-loading" class="loading-overlay">
        <div class="relative">
            <div class="w-16 h-16 border-2 border-blue-500/5 rounded-full"></div>
            <div class="absolute inset-0 w-16 h-16 border-t-2 border-blue-500 rounded-full animate-spin"></div>
        </div>
        <p id="loading-text" class="mt-6 text-[10px] font-black tracking-[0.3em] text-blue-500 uppercase animate-pulse">Loading Database</p>
    </div>

    <div id="main-content" class="w-full max-w-[420px] hidden opacity-0 transition-all duration-1000 transform translate-y-4">
        <header class="flex flex-col items-center text-center mb-12">
            <div class="profile-container relative w-28 h-28 mb-8">
                <div class="absolute inset-[-10px] bg-blue-500 blur-3xl opacity-20"></div>
                <div class="relative w-full h-full rounded-[35px] overflow-hidden p-[2px] bg-gradient-to-tr from-blue-600 via-transparent to-blue-400 border border-white/10 shadow-2xl">
                    <img src="https://files.catbox.moe/4y3suf.png" class="w-full h-full object-cover rounded-[33px]">
                </div>
            </div>
            
            <h1 class="text-4xl font-black tracking-tighter italic uppercase leading-none mb-2">HM <span class="text-blue-500">STREAM</span></h1>
            <span class="text-[9px] px-3 py-1 bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-full font-black tracking-widest uppercase mb-6">Version 6.5</span>
            
            <div class="mt-4 px-8">
                <p class="text-[11px] text-white/30 leading-relaxed font-semibold uppercase tracking-widest">
                    Aplikasi ini di ciptakan oleh <span class="text-blue-400/80">HM MODZ TEAM</span>. 
                    Aplikasi ini Gratis dan terimakasih untuk para donatur.
                </p>
            </div>
        </header>

        <div class="grid grid-cols-1 gap-4 mb-14">
            <button onclick="showAnimeAlert()" class="nav-card btn-ios flex items-center p-5 w-full">
                <div class="status-dot"></div>
                <div class="icon-box w-12 h-12 bg-blue-500/15 rounded-2xl flex items-center justify-center text-blue-400 mr-5 shadow-lg border border-blue-500/10"><i class="fa-solid fa-play text-lg"></i></div>
                <div class="flex-1 text-left">
                    <h3 class="text-[16px] font-extrabold text-white/90 tracking-tight">Anime Stream</h3>
                    <p class="text-[9px] text-white/20 font-bold uppercase tracking-tighter mt-1">Nonton Anime Terlengkap Dan Terupdate.</p>
                </div>
            </button>

            <button onclick="showAlert('Donghua Stream', 'https://donghub.vip/')" class="nav-card btn-ios flex items-center p-5 w-full">
                <div class="status-dot"></div>
                <div class="icon-box w-12 h-12 bg-orange-500/15 rounded-2xl flex items-center justify-center text-orange-400 mr-5 shadow-lg border border-orange-500/10"><i class="fa-solid fa-dragon text-lg"></i></div>
                <div class="flex-1 text-left">
                    <h3 class="text-[16px] font-extrabold text-white/90 tracking-tight">Donghua Stream</h3>
                    <p class="text-[9px] text-white/20 font-bold uppercase tracking-tighter mt-1">Nonton Donghua Dengan Grafik Tinggi.</p>
                </div>
            </button>

            <button onclick="showAlert('Drama China', 'https://www.dracin21.com/page/')" class="nav-card btn-ios flex items-center p-5 w-full">
                <div class="status-dot"></div>
                <div class="icon-box w-12 h-12 bg-rose-500/15 rounded-2xl flex items-center justify-center text-rose-400 mr-5 shadow-lg border border-rose-500/10"><i class="fa-solid fa-heart text-lg"></i></div>
                <div class="flex-1 text-left">
                    <h3 class="text-[16px] font-extrabold text-white/90 tracking-tight">Drama China</h3>
                    <p class="text-[9px] text-white/20 font-bold uppercase tracking-tighter mt-1">Dracin Telah Hadir Dengan Berbagai Spesifikasi</p>
                </div>
            </button>

            <button onclick="showAlert('Movie Cinema', 'https://tv9.lk21official.cc/')" class="nav-card btn-ios flex items-center p-5 w-full">
                <div class="status-dot"></div>
                <div class="icon-box w-12 h-12 bg-purple-500/15 rounded-2xl flex items-center justify-center text-purple-400 mr-5 shadow-lg border border-purple-500/10"><i class="fa-solid fa-clapperboard text-lg"></i></div>
                <div class="flex-1 text-left">
                    <h3 class="text-[16px] font-extrabold text-white/90 tracking-tight">Movie Cinema</h3>
                    <p class="text-[9px] text-white/20 font-bold uppercase tracking-tighter mt-1">Global Movie Stream</p>
                </div>
            </button>

            <button onclick="showAlert('Manhwa Hub', 'https://01.komiku.asia/')" class="nav-card btn-ios flex items-center p-5 w-full">
                <div class="status-dot"></div>
                <div class="icon-box w-12 h-12 bg-emerald-500/15 rounded-2xl flex items-center justify-center text-emerald-400 mr-5 shadow-lg border border-emerald-500/10"><i class="fa-solid fa-book-open text-lg"></i></div>
                <div class="flex-1 text-left">
                    <h3 class="text-[16px] font-extrabold text-white/90 tracking-tight">Manhwa Hub</h3>
                    <p class="text-[9px] text-white/20 font-bold uppercase tracking-tighter mt-1">Baca Manhwa/Comic Secara Gratis</p>
                </div>
            </button>
        </div>

        <div class="ios-blur p-7 mb-10 shadow-xl border-white/5 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-5"><i class="fa-solid fa-clock-rotate-left text-4xl"></i></div>
            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-500/50 mb-6 italic">History Stream</h3>
            <div id="history-list" class="space-y-4"></div>
        </div>

        <footer class="text-center opacity-20">
            <p class="text-[8px] font-black uppercase tracking-[0.5em]">© HM MODZ TEAM</p>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let isTabActive = true;

        document.addEventListener("visibilitychange", () => { isTabActive = !document.hidden; });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.2;
                this.speedX = Math.random() * 0.15 - 0.075;
                this.speedY = Math.random() * 0.15 - 0.075;
                this.alpha = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(59, 130, 246, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 60; i++) particles.push(new Particle());
        }

        function animate() {
            if (isTabActive) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { resize(); init(); });
        resize(); init(); animate();

        let pUrl = "", pTitle = "";

        function showAnimeAlert() {
            pTitle = "Anime Stream";
            document.getElementById('alert-title').innerText = "Select Acces Server";
            document.getElementById('normal-actions').classList.add('hidden');
            document.getElementById('server-actions').classList.remove('hidden');
            document.getElementById('custom-alert').style.display = 'flex';
        }

        function showAlert(title, url) {
            pUrl = url; pTitle = title;
            document.getElementById('alert-title').innerText = "Access Confirmation";
            document.getElementById('server-actions').classList.add('hidden');
            document.getElementById('normal-actions').classList.remove('hidden');
            document.getElementById('custom-alert').style.display = 'flex';
        }

        function closeAlert() { document.getElementById('custom-alert').style.display = 'none'; }

        function executeRedirect(customUrl) {
            const target = customUrl || pUrl;
            const btn = event.target;
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin mr-2"></i> Connecting...';
            setTimeout(() => {
                closeAlert();
                saveH(pTitle, target);
                document.getElementById('global-loading').style.display = 'flex';
                setTimeout(() => { window.location.href = target; }, 1200);
            }, 400);
        }

        function saveH(t, u) {
            let h = JSON.parse(localStorage.getItem('hm_h')) || [];
            h = h.filter(x => x.u !== u);
            const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            h.unshift({t:t, u:u, time:now});
            if(h.length > 5) h.pop();
            localStorage.setItem('hm_h', JSON.stringify(h));
        }

        function renderH() {
            const container = document.getElementById('history-list');
            const h = JSON.parse(localStorage.getItem('hm_h')) || [];
            if(h.length === 0) { 
                container.innerHTML = '<div class="flex flex-col items-center py-4 opacity-10"><i class="fa-solid fa-inbox mb-2 text-xl"></i><p class="text-[9px] font-bold uppercase tracking-widest text-center">System Log Empty</p></div>'; 
                return; 
            }
            container.innerHTML = h.map(i => `
                <div class="flex justify-between items-center bg-white/[0.03] p-4 rounded-2xl border border-white/5 active:scale-[0.97] transition-all group" onclick="window.location.href='${i.u}'">
                    <div class="flex flex-col">
                        <span class="text-[12px] font-bold text-white/70">${i.t}</span>
                        <span class="text-[8px] text-blue-500/50 font-black uppercase mt-1 tracking-widest">${i.time}</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-white/10 text-[8px]"></i>
                </div>
            `).join('');
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('skeleton-loader').style.display = 'none';
                const m = document.getElementById('main-content');
                m.classList.remove('hidden');
                setTimeout(() => {
                    m.classList.add('opacity-100');
                    m.style.transform = 'translateY(0)';
                }, 50);
                renderH();
            }, 1000);
        };
    </script>
</body>
</html>
