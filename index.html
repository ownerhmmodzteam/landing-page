<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience By hmmodz</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --ios-blue: #0A84FF;
            --cyber-blue: #00f2fe;
            --deep-blue: #4facfe;
            --ios-bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--ios-bg); color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        #particle-canvas {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 0;
        }
        .vignette {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 1; pointer-events: none;
        }
        .main-wrapper {
            position: relative; z-index: 10; width: 85%; max-width: 380px;
            text-align: center; 
            animation: iosAppear 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .video-container {
            width: 100%; aspect-ratio: 16/9;
            background: var(--glass);
            border-radius: 24px; 
            border: 1px solid var(--border-glass);
            overflow: hidden; position: relative;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            margin-bottom: 30px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            animation: float 6s ease-in-out infinite;
        }
        .video-container video {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.9; mix-blend-mode: lighten;
        }
        .app-info h1 {
            font-size: 28px; font-weight: 800; margin: 0;
            background: linear-gradient(180deg, #FFFFFF 0%, #A2A2A2 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            animation: shimmer 3s infinite linear;
            background-size: 200% auto;
        }
        .app-info p {
            font-size: 12px; color: rgba(255,255,255,0.4); margin: 8px 0 25px;
            letter-spacing: 1.2px; text-transform: uppercase; font-weight: 500;
        }
        .ios-loader {
            display: block; position: relative;
            width: 24px; height: 24px; margin: 0 auto;
        }
        .ios-loader div { 
            transform-origin: 12px 12px; 
            animation: ios-loader 1.2s linear infinite; 
        }
        .ios-loader div:after {
            content: " "; display: block; position: absolute;
            top: 2px; left: 11px; width: 2px; height: 6px;
            border-radius: 2px; background: #fff;
        }
        .ios-loader div:nth-child(1) { transform: rotate(0deg); animation-delay: -1.1s; }
        .ios-loader div:nth-child(2) { transform: rotate(30deg); animation-delay: -1s; }
        .ios-loader div:nth-child(3) { transform: rotate(60deg); animation-delay: -0.9s; }
        .ios-loader div:nth-child(4) { transform: rotate(90deg); animation-delay: -0.8s; }
        .ios-loader div:nth-child(5) { transform: rotate(120deg); animation-delay: -0.7s; }
        .ios-loader div:nth-child(6) { transform: rotate(150deg); animation-delay: -0.6s; }
        .ios-loader div:nth-child(7) { transform: rotate(180deg); animation-delay: -0.5s; }
        .ios-loader div:nth-child(8) { transform: rotate(210deg); animation-delay: -0.4s; }
        .ios-loader div:nth-child(9) { transform: rotate(240deg); animation-delay: -0.3s; }
        .ios-loader div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.2s; }
        .ios-loader div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1s; }
        .ios-loader div:nth-child(12) { transform: rotate(330deg); animation-delay: 0s; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes shimmer { to { background-position: 200% center; } }
        @keyframes ios-loader { 0% { opacity: 1; } 100% { opacity: 0.1; } }
        @keyframes iosAppear { 
            0% { opacity: 0; transform: translateY(15px) scale(0.98); } 
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }
        .ios-swal-popup {
            border-radius: 22px !important;
            background: rgba(10, 10, 10, 0.8) !important;
            backdrop-filter: blur(20px) saturate(160%) !important;
            -webkit-backdrop-filter: blur(20px) saturate(160%) !important;
            border: 1px solid rgba(255,255,255,0.06) !important;
        }
        .ios-swal-title { color: #fff !important; font-size: 18px !important; font-weight: 600 !important; }
        .ios-swal-html { color: rgba(255,255,255,0.5) !important; font-size: 13px !important; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="vignette"></div>
    <div class="main-wrapper" id="content">
        <div class="video-container">
            <video autoplay muted loop playsinline>
                <source src="https://files.catbox.moe/m864q5.mp4" type="video/mp4">
            </video>
        </div>
        <div class="app-info">
            <h1>HM MODZ STREAM</h1>
            <p>Welcome To My Apps</p>
            <div class="ios-loader">
                <div></div><div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div><div></div>
            </div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particlesArray = [];
        const numberOfParticles = 70;
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speed = (Math.random() * 3) + 1; 
                this.size = (Math.random() * 2) + 0.5;
                const blueVal = Math.floor(Math.random() * 100) + 155;
                const greenVal = Math.floor(Math.random() * 150);
                this.color = `rgba(0, ${greenVal}, ${blueVal}, ${Math.random() * 0.6 + 0.1})`;
                this.glow = Math.random() > 0.8;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size / 2, this.size * 2, 0, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                if (this.glow) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00f2fe';
                }
                ctx.fill();
                ctx.closePath();
                ctx.shadowBlur = 0;
            }
        }
        function init() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }
        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }
        init();
        animate();
        window.addEventListener('resize', function(){
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
        async function startApp() {
            const CONFIG_URL = "https://raw.githubusercontent.com/ownerhmmodzteam/landing-page/refs/heads/main/attack.json" + Date.now(); 
            const REDIRECT_ATTACK = "https://security-attack.netlify.app/";
            const MAIN_SITE = "https://main-page-streambyhmmodz.netlify.app/";
            let isUnderAttack = false;
            let isClosed = false;
            try {
                const response = await fetch(CONFIG_URL);
                const data = await response.json();
                isUnderAttack = data.isUnderAttack;
                isClosed = data.isClosed;
            } catch (e) {
                isUnderAttack = false;
                isClosed = false;
            }
            setTimeout(() => {
                if (isUnderAttack) {
                    Swal.fire({
                        title: 'Security Alert',
                        text: 'Aplikasi terdeteksi tidak resmi dari HM MODZ TEAM, Terjadi Perubahan Pada Smali,Kotlin,Assets.',
                        icon: 'warning',
                        showConfirmButton: false,
                        allowOutsideClick: false,
                        customClass: { popup: 'ios-swal-popup', title: 'ios-swal-title', htmlContainer: 'ios-swal-html' },
                        didOpen: () => { Swal.showLoading(); }
                    });
                    setTimeout(() => { window.location.href = REDIRECT_ATTACK; }, 3000);
                    return;
                }
                if (isClosed) {
                    Swal.fire({
                        title: 'Maintenance',
                        text: 'Maaf Pengguna Terhormat, aplikasi sedang ditutup sementara karna hmmodz team akan istirahat sebentar.',
                        icon: 'info',
                        showConfirmButton: false,
                        allowOutsideClick: false,
                        customClass: { popup: 'ios-swal-popup', title: 'ios-swal-title', htmlContainer: 'ios-swal-html' },
                        didOpen: () => { Swal.showLoading(); }
                    });
                    return;
                }
                const content = document.getElementById('content');
                content.style.transition = 'all 1s cubic-bezier(0.16, 1, 0.3, 1)';
                content.style.opacity = '0';
                content.style.transform = 'scale(1.02) translateY(-10px)';
                Swal.fire({
                    title: 'Authenticating...',
                    html: 'connection to server in <b></b>',
                    timer: 3500,
                    timerProgressBar: true,
                    allowOutsideClick: false,
                    showConfirmButton: false,
                    customClass: { popup: 'ios-swal-popup', title: 'ios-swal-title', htmlContainer: 'ios-swal-html' },
                    didOpen: () => {
                        Swal.showLoading();
                        const b = Swal.getHtmlContainer().querySelector('b');
                        const timerInterval = setInterval(() => {
                            const left = Swal.getTimerLeft();
                            if(left > 0) { b.textContent = (left / 1000).toFixed(1) + 's'; } 
                            else { clearInterval(timerInterval); }
                        }, 100);
                    }
                }).then(() => {
                    document.body.style.transition = '0.8s ease-in-out';
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = MAIN_SITE; }, 500);
                });
            }, 4500);
        }
        startApp();
    </script>
</body>
</html>
