<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM MODZ STREAM</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --glass: rgba(255, 255, 255, 0.04);
            --border-glass: rgba(255, 255, 255, 0.1);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--ios-bg); color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        #particle-canvas { position: absolute; width: 100%; height: 100%; z-index: 0; }
        .main-wrapper {
            position: relative; z-index: 10; width: 85%; max-width: 360px;
            text-align: center; transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .video-container {
            width: 100%; aspect-ratio: 16/9; background: var(--glass);
            border-radius: 24px; border: 1px solid var(--border-glass);
            overflow: hidden; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            margin-bottom: 25px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        .video-container video { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .app-info h1 {
            font-size: 28px; font-weight: 800; margin: 0;
            background: linear-gradient(180deg, #FFFFFF 0%, #A2A2A2 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .app-info p { font-size: 11px; color: rgba(255,255,255,0.4); margin: 8px 0 25px; letter-spacing: 1.2px; text-transform: uppercase; }
        .ios-loader { display: block; position: relative; width: 24px; height: 24px; margin: 0 auto; }
        .ios-loader div { transform-origin: 12px 12px; animation: ios-loader 1.2s linear infinite; }
        .ios-loader div:after { content: " "; display: block; position: absolute; top: 2px; left: 11px; width: 2px; height: 6px; border-radius: 2px; background: #fff; }
        .ios-loader div:nth-child(1) { transform: rotate(0deg); animation-delay: -1.1s; }
        .ios-loader div:nth-child(2) { transform: rotate(30deg); animation-delay: -1s; }
        .ios-loader div:nth-child(3) { transform: rotate(60deg); animation-delay: -0.9s; }
        .ios-loader div:nth-child(4) { transform: rotate(90deg); animation-delay: -0.8s; }
        .ios-loader div:nth-child(5) { transform: rotate(120deg); animation-delay: -0.7s; }
        .ios-loader div:nth-child(6) { transform: rotate(150deg); animation-delay: -0.6s; }
        .ios-loader div:nth-child(7) { transform: rotate(180deg); animation-delay: -0.5s; }
        .ios-loader div:nth-child(8) { transform: rotate(210deg); animation-delay: -0.4s; }
        .ios-loader div:nth-child(9) { transform: rotate(240deg); animation-delay: -0.3s; }
        .ios-loader div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.2s; }
        .ios-loader div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1s; }
        .ios-loader div:nth-child(12) { transform: rotate(330deg); animation-delay: 0s; }
        @keyframes ios-loader { 0% { opacity: 1; } 100% { opacity: 0.1; } }
        .ios-swal-popup { border-radius: 22px !important; background: rgba(15, 15, 15, 0.8) !important; backdrop-filter: blur(20px) !important; border: 1px solid rgba(255,255,255,0.08) !important; }
        .ios-swal-title { color: #fff !important; font-size: 18px !important; }
        .ios-swal-html { color: rgba(255,255,255,0.5) !important; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="main-wrapper" id="content">
        <div class="video-container">
            <video autoplay muted loop playsinline><source src="https://files.catbox.moe/m864q5.mp4" type="video/mp4"></video>
        </div>
        <div class="app-info">
            <h1>HM MODZ STREAM</h1>
            <p>Welcome To My Apps</p>
            <div class="ios-loader">
                <div></div><div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div><div></div>
            </div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        class P {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*2; this.v = Math.random()*0.5+0.2; }
            update() { this.y += this.v; if(this.y > canvas.height) this.y = 0; }
            draw() { ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill(); }
        }
        function init() { for(let i=0; i<50; i++) particles.push(new P()); }
        function loop() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(loop); }
        init(); loop();

        setTimeout(() => {
            document.getElementById('content').style.opacity = "0";
            Swal.fire({
                title: 'Authenticating...',
                html: 'Connecting in <b></b>',
                timer: 3000,
                timerProgressBar: true,
                showConfirmButton: false,
                allowOutsideClick: false,
                customClass: { popup: 'ios-swal-popup', title: 'ios-swal-title', htmlContainer: 'ios-swal-html' },
                didOpen: () => {
                    Swal.showLoading();
                    const b = Swal.getHtmlContainer().querySelector('b');
                    setInterval(() => { b.textContent = (Swal.getTimerLeft()/1000).toFixed(1) + 's'; }, 100);
                }
            }).then(() => {
                document.body.style.opacity = "0";
                document.body.style.transition = "0.5s";
                setTimeout(() => { window.location.href = "https://main-page-streambyhmmodz.netlify.app/"; }, 500);
            });
        }, 4000);
    </script>
</body>
</html>
