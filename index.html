<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axata Premium Experience</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --ios-blue: #0A84FF;
            --ios-bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--ios-bg); color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        #particles-js {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 0;
        }

        .main-wrapper {
            position: relative; z-index: 10; width: 85%; max-width: 380px;
            text-align: center; 
            animation: iosAppear 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .video-container {
            width: 100%; aspect-ratio: 16/9;
            background: var(--glass);
            border-radius: 24px; 
            border: 1px solid var(--border-glass);
            overflow: hidden; position: relative;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            margin-bottom: 30px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            animation: float 6s ease-in-out infinite;
        }

        .video-container video {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.8; mix-blend-mode: lighten;
        }

        .app-info h1 {
            font-size: 28px; font-weight: 800; margin: 0;
            background: linear-gradient(180deg, #FFFFFF 0%, #A2A2A2 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            animation: shimmer 3s infinite linear;
            background-size: 200% auto;
        }

        .app-info p {
            font-size: 12px; color: rgba(255,255,255,0.4); margin: 8px 0 25px;
            letter-spacing: 1.2px; text-transform: uppercase; font-weight: 500;
        }

        .ios-loader {
            display: block; position: relative;
            width: 24px; height: 24px; margin: 0 auto;
        }
        .ios-loader div { 
            transform-origin: 12px 12px; 
            animation: ios-loader 1.2s linear infinite; 
        }
        .ios-loader div:after {
            content: " "; display: block; position: absolute;
            top: 2px; left: 11px; width: 2px; height: 6px;
            border-radius: 2px; background: #fff;
        }
        .ios-loader div:nth-child(1) { transform: rotate(0deg); animation-delay: -1.1s; }
        .ios-loader div:nth-child(2) { transform: rotate(30deg); animation-delay: -1s; }
        .ios-loader div:nth-child(3) { transform: rotate(60deg); animation-delay: -0.9s; }
        .ios-loader div:nth-child(4) { transform: rotate(90deg); animation-delay: -0.8s; }
        .ios-loader div:nth-child(5) { transform: rotate(120deg); animation-delay: -0.7s; }
        .ios-loader div:nth-child(6) { transform: rotate(150deg); animation-delay: -0.6s; }
        .ios-loader div:nth-child(7) { transform: rotate(180deg); animation-delay: -0.5s; }
        .ios-loader div:nth-child(8) { transform: rotate(210deg); animation-delay: -0.4s; }
        .ios-loader div:nth-child(9) { transform: rotate(240deg); animation-delay: -0.3s; }
        .ios-loader div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.2s; }
        .ios-loader div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1s; }
        .ios-loader div:nth-child(12) { transform: rotate(330deg); animation-delay: 0s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        @keyframes ios-loader { 0% { opacity: 1; } 100% { opacity: 0.1; } }
        
        @keyframes iosAppear { 
            0% { opacity: 0; transform: translateY(15px) scale(0.98); } 
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }

        .ios-swal-popup {
            border-radius: 22px !important;
            background: rgba(20, 20, 20, 0.8) !important;
            backdrop-filter: blur(25px) saturate(160%) !important;
            -webkit-backdrop-filter: blur(25px) saturate(160%) !important;
            border: 1px solid rgba(255,255,255,0.08) !important;
        }
        .ios-swal-title { color: #fff !important; font-size: 18px !important; font-weight: 600 !important; }
        .ios-swal-html { color: rgba(255,255,255,0.5) !important; font-size: 13px !important; }

    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="main-wrapper" id="content">
        <div class="video-container">
            <video autoplay muted loop playsinline>
                <source src="https://files.catbox.moe/tfbj11.mp4" type="video/mp4">
            </video>
        </div>

        <div class="app-info">
            <h1>HM MODZ STREAM</h1>
            <p>Welcome To My Apps</p>
            
            <div class="ios-loader">
                <div></div><div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div><div></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2, "random": true },
                "size": { "value": 1.2, "random": true },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 0.5, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
            }
        });
    
        setTimeout(() => {
            const content = document.getElementById('content');
            content.style.transition = 'all 1s cubic-bezier(0.16, 1, 0.3, 1)';
            content.style.opacity = '0';
            content.style.transform = 'scale(1.02) translateY(-10px)';

            Swal.fire({
                title: 'Authenticating...',
                html: 'connection to server in <b></b>',
                timer: 3500,
                timerProgressBar: true,
                allowOutsideClick: false,
                showConfirmButton: false,
                customClass: {
                    popup: 'ios-swal-popup',
                    title: 'ios-swal-title',
                    htmlContainer: 'ios-swal-html'
                },
                didOpen: () => {
                    Swal.showLoading();
                    const b = Swal.getHtmlContainer().querySelector('b');
                    setInterval(() => {
                        const left = Swal.getTimerLeft();
                        if(left) b.textContent = (left / 1000).toFixed(1) + 's';
                    }, 100);
                }
            }).then(() => {
                document.body.style.transition = '0.8s ease-in-out';
                document.body.style.opacity = '0';
                setTimeout(() => {
                    window.location.href = "https://main-page-streambyhmmodz.netlify.app/";
                }, 500);
            });
        }, 4500);
    </script>
</body>
</html>
