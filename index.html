<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HM MODZ STREAM V2 - Loading</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0; background: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
        }

        .bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1c1c1e 0%, #000 100%);
            z-index: -1;
        }

        .container { 
            text-align: center; z-index: 1; 
            animation: fadeIn 1s ease-out;
        }

        .profile-box {
            margin-bottom: 30px;
            opacity: 0;
            animation: slideUp 0.8s ease-out forwards;
            animation-delay: 0.5s;
        }

        .avatar {
            width: 90px; height: 90px;
            border-radius: 22px; /* iOS Squircle style */
            border: 2px solid var(--ios-blue);
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.3);
            object-fit: cover;
        }

        .app-name {
            color: white; font-size: 24px; font-weight: 700;
            margin: 0; letter-spacing: -0.5px;
        }

        .app-desc {
            color: #8e8e93; font-size: 14px; margin-top: 5px;
            max-width: 250px; line-height: 1.4;
        }

        .loader-wrapper {
            position: relative; width: 60px; height: 60px; margin: 20px auto;
        }

        .loader {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--ios-blue);
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .ios-popup {
            border-radius: 14px !important;
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
        }

        .ios-title { color: #000 !important; font-size: 17px !important; }
        .ios-content { color: #333 !important; font-size: 13px !important; }

    </style>
</head>
<body>
    <div class="bg"></div>
    
    <div class="container" id="main-content">
        <div class="profile-box">
            <img src="https://files.catbox.moe/4y3suf.png" alt="HM" class="avatar">
            <h1 class="app-name">HM MODZ STREAM</h1>
            <p class="app-desc">Aplikasi yang berkembang di era perang dunia 3, welcome to HM MODZ STREAM</p>
        </div>

        <div class="loader-wrapper">
            <div class="loader"></div>
        </div>
        
        <div style="color: #555; font-size: 10px; letter-spacing: 2px; font-weight: bold;">
            Connected To Server....
        </div>
    </div>

    <script>
        setTimeout(() => {
            const content = document.getElementById('main-content');
            content.style.opacity = '0';
            content.style.transition = '0.8s ease';
            
            setTimeout(() => {
                let timerInterval;
                Swal.fire({
                    title: 'Verifikasi Server',
                    html: 'Menghubungkan ke Server dalam <b></b>...',
                    timer: 4000,
                    timerProgressBar: true,
                    allowOutsideClick: false,
                    showConfirmButton: false,
                    customClass: {
                        popup: 'ios-popup',
                        title: 'ios-title',
                        htmlContainer: 'ios-content'
                    },
                    didOpen: () => {
                        Swal.showLoading();
                        const b = Swal.getHtmlContainer().querySelector('b');
                        timerInterval = setInterval(() => {
                            b.textContent = Math.ceil(Swal.getTimerLeft() / 1000) + 's';
                        }, 100);
                    },
                    willClose: () => { clearInterval(timerInterval); }
                }).then((result) => {
                    if (result.dismiss === Swal.DismissReason.timer) {
                        document.body.style.opacity = '0';
                        document.body.style.transition = '1s';
                        setTimeout(() => {
                            window.location.href = "https://main-page-streambyhmmodz.netlify.app/";
                        }, 1000);
                    }
                });
            }, 500);
        }, 3500);
    </script>
</body>
</html>
