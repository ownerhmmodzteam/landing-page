<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            margin: 0; padding: 0; background: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        }

        /* Background dengan efek kedalaman */
        .bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: -1;
        }

        .container { text-align: center; z-index: 1; }

        /* Loader Ring Gaya iOS */
        .loader {
            width: 80px; height: 80px;
            position: relative; margin: 0 auto 25px;
        }
        .loader:before, .loader:after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; border: 3px solid transparent;
            border-top-color: #007AFF; 
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        .loader:after {
            width: 70%; height: 70%; top: 15%; left: 15%;
            border-top-color: #30D158; /* Warna hijau khas iOS */
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) reverse infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .text {
            color: white; font-size: 12px; letter-spacing: 5px;
            text-transform: uppercase; font-weight: 600;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.95); } }

        /* Custom SweetAlert agar sangat mirip iOS */
        .ios-popup {
            border-radius: 20px !important;
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            width: 280px !important; /* Ukuran standard alert iPhone */
        }
        .ios-title {
            color: #000 !important;
            font-size: 18px !important;
            font-weight: 600 !important;
        }
        .ios-content {
            color: #000 !important;
            font-size: 14px !important;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container" id="loader-content">
        <div class="loader"></div>
        <div class="text">HM MODZ STREAM V2</div>
    </div>

    <script>
        // Simulasi loading awal 3 detik
        setTimeout(() => {
            document.getElementById('loader-content').style.opacity = '0';
            document.getElementById('loader-content').style.transition = '0.5s';
            
            let timerInterval;
            Swal.fire({
                title: 'Mohon Tunggu',
                html: 'Memasuki Server dalam <b></b> detik.',
                timer: 5000, // Menunggu 5 detik
                timerProgressBar: true,
                allowOutsideClick: false,
                showConfirmButton: false, // Menghapus tombol "Lanjutkan"
                customClass: {
                    popup: 'ios-popup',
                    title: 'ios-title',
                    htmlContainer: 'ios-content'
                },
                didOpen: () => {
                    Swal.showLoading(null); // Efek loading spinner iOS
                    const b = Swal.getHtmlContainer().querySelector('b');
                    timerInterval = setInterval(() => {
                        b.textContent = Math.ceil(Swal.getTimerLeft() / 1000);
                    }, 100);
                },
                willClose: () => {
                    clearInterval(timerInterval);
                }
            }).then((result) => {
                if (result.dismiss === Swal.DismissReason.timer) {
                    window.location.href = "https://main-page-streambyhmmodz.netlify.app/";
                }
            });
        }, 3000);
    </script>
</body>
</html>
