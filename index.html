<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Screen</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --ios-bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--ios-bg); color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        #particle-canvas { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 0; }
        .vignette { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%); z-index: 1; pointer-events: none; }
        .main-wrapper { position: relative; z-index: 10; width: 85%; max-width: 380px; text-align: center; animation: iosAppear 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .video-container { width: 100%; aspect-ratio: 16/9; background: var(--glass); border-radius: 24px; border: 1px solid var(--border-glass); overflow: hidden; position: relative; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); animation: float 6s ease-in-out infinite; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .app-info h1 { font-size: 28px; font-weight: 800; margin: 0; background: linear-gradient(180deg, #FFFFFF 0%, #A2A2A2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        .app-info p { font-size: 11px; color: rgba(255,255,255,0.4); margin: 8px 0 25px; letter-spacing: 1.2px; text-transform: uppercase; }
        .ios-loader { display: block; position: relative; width: 24px; height: 24px; margin: 0 auto; }
        .ios-loader div { transform-origin: 12px 12px; animation: ios-loader 1.2s linear infinite; }
        .ios-loader div:after { content: " "; display: block; position: absolute; top: 2px; left: 11px; width: 2px; height: 6px; border-radius: 2px; background: #fff; }
        .ios-loader div:nth-child(1) { transform: rotate(0deg); animation-delay: -1.1s; }
        .ios-loader div:nth-child(2) { transform: rotate(30deg); animation-delay: -1s; }
        .ios-loader div:nth-child(3) { transform: rotate(60deg); animation-delay: -0.9s; }
        .ios-loader div:nth-child(4) { transform: rotate(90deg); animation-delay: -0.8s; }
        .ios-loader div:nth-child(5) { transform: rotate(120deg); animation-delay: -0.7s; }
        .ios-loader div:nth-child(6) { transform: rotate(150deg); animation-delay: -0.6s; }
        .ios-loader div:nth-child(7) { transform: rotate(180deg); animation-delay: -0.5s; }
        .ios-loader div:nth-child(8) { transform: rotate(210deg); animation-delay: -0.4s; }
        .ios-loader div:nth-child(9) { transform: rotate(240deg); animation-delay: -0.3s; }
        .ios-loader div:nth-child(10) { transform: rotate(270deg); animation-delay: -0.2s; }
        .ios-loader div:nth-child(11) { transform: rotate(300deg); animation-delay: -0.1s; }
        .ios-loader div:nth-child(12) { transform: rotate(330deg); animation-delay: 0s; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes ios-loader { 0% { opacity: 1; } 100% { opacity: 0.1; } }
        @keyframes iosAppear { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        .ios-swal-popup { border-radius: 22px !important; background: rgba(15, 15, 15, 0.9) !important; backdrop-filter: blur(25px) !important; border: 1px solid rgba(255,255,255,0.1) !important; }
        .ios-swal-title { color: #fff !important; font-size: 18px !important; }
        .ios-swal-html { color: rgba(255,255,255,0.8) !important; font-weight: 500 !important; }
        .swal2-styled.swal2-confirm { background-color: #0A84FF !important; border-radius: 12px !important; padding: 10px 25px !important; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="vignette"></div>
    <div class="main-wrapper" id="content">
        <div class="video-container">
            <video autoplay muted loop playsinline>
                <source src="https://files.catbox.moe/m864q5.mp4" type="video/mp4">
            </video>
        </div>
        <div class="app-info">
            <h1>HM MODZ STREAM</h1>
            <p>Welcome To My Apps</p>
            <div class="ios-loader">
                <div></div><div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div><div></div>
            </div>
        </div>
    </div>

    <script>
        const APP_CONFIG = {
            isUnderAttack: true,
            isClosed: false,
            isUpdate: false,
            redirectAttack: "security/index.html",
            mainSite: "home/index.html",
            updateSite: "update/index.html"
        };

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speed = (Math.random() * 2) + 0.5;
                this.size = (Math.random() * 1.5) + 0.5;
                this.color = `rgba(255, 255, 255, ${Math.random() * 0.3})`;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.init();
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function setupParticles() {
            setCanvasSize();
            particlesArray = [];
            for (let i = 0; i < 50; i++) particlesArray.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function startApp() {
            setTimeout(() => {
                if (APP_CONFIG.isUnderAttack) {
                    Swal.fire({
                        title: 'Security Alert',
                        text: 'Aplikasi terdeteksi tidak resmi dari HM MODZ TEAM.',
                        icon: 'warning',
                        showConfirmButton: false,
                        allowOutsideClick: false,
                        customClass: { popup: 'ios-swal-popup', title: 'ios-swal-title', htmlContainer: 'ios-swal-html' },
                        didOpen: () => { Swal.showLoading(); setTimeout(() => { window.location.href = APP_CONFIG.redirectAttack; }, 3000); }
                    });
                    return;
                }

                if (APP_CONFIG.isUpdate) {
                    Swal.fire({
                        title: 'Update Available',
                        text: 'Versi terbaru sudah tersedia. Silakan update sekarang.',
                        icon: 'info',
                        confirmButtonText: 'Update Now',
                        allowOutsideClick: false,
                        customClass: { popup: 'ios-swal-popup', title: 'ios-swal-title', htmlContainer: 'ios-swal-html' }
                    }).then((result) => { if (result.isConfirmed) window.location.href = APP_CONFIG.updateSite; });
                    return;
                }

                if (APP_CONFIG.isClosed) {
                    Swal.fire({
                        title: 'Server Maintenance',
                        text: 'Maaf, aplikasi sedang dalam perbaikan.',
                        icon: 'info',
                        showConfirmButton: false,
                        allowOutsideClick: false,
                        customClass: { popup: 'ios-swal-popup', title: 'ios-swal-title', htmlContainer: 'ios-swal-html' },
                        didOpen: () => { Swal.showLoading(); }
                    });
                    return;
                }

                const content = document.getElementById('content');
                content.style.opacity = '0';
                content.style.transform = 'scale(1.05)';
                content.style.transition = 'all 0.8s ease';

                let timerInterval;
                Swal.fire({
                    title: 'Authenticating...',
                    html: '<div style="margin-top:8px;">Connection to server in <b id="timer-val" style="color:#0A84FF;">3.0s</b></div>',
                    timer: 3000,
                    timerProgressBar: true,
                    allowOutsideClick: false,
                    showConfirmButton: false,
                    customClass: { popup: 'ios-swal-popup', title: 'ios-swal-title', htmlContainer: 'ios-swal-html' },
                    didOpen: () => {
                        const b = Swal.getHtmlContainer().querySelector('#timer-val');
                        timerInterval = setInterval(() => {
                            const left = Swal.getTimerLeft();
                            if(left > 0) b.textContent = (left / 1000).toFixed(1) + 's';
                        }, 100);
                    },
                    willClose: () => { clearInterval(timerInterval); }
                }).then(() => {
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.5s ease';
                    setTimeout(() => { window.location.href = APP_CONFIG.mainSite; }, 500);
                });
            }, 4500);
        }

        setupParticles();
        animate();
        startApp();
        window.addEventListener('resize', setupParticles);
    </script>
</body>
</html>
